services:
  tiddl-backend:
    # build: . # Build locally
    image: ghcr.io/psaac/tiddl-addon/tiddl-backend:latest
    ports:
      - "8765:8765"
    environment:
      - PYTHONUNBUFFERED=1
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8765
      - TIDDL_OUTPUT_DIR=/downloads
    volumes:
      - ~/.tiddl:/root/.tiddl # Mount tiddl config directory
      - /mnt/c/Users/pbellebouche/Downloads:/downloads # Mount host download directory
    restart: unless-stopped
