stages:
  - build
  - publish

variables:
  DOCKER_IMAGE_NAME: tiddl-backend
  REGISTRY_IMAGE: ${CI_REGISTRY}/${CI_PROJECT_PATH}/${DOCKER_IMAGE_NAME}

build_docker:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t ${REGISTRY_IMAGE}:latest .
    - docker build -t ${REGISTRY_IMAGE}:${CI_COMMIT_SHA:0:8} .
    - docker push ${REGISTRY_IMAGE}:latest
    - docker push ${REGISTRY_IMAGE}:${CI_COMMIT_SHA:0:8}
  only:
    - main
    - tags

publish_docker_tag:
  stage: publish
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker pull ${REGISTRY_IMAGE}:${CI_COMMIT_SHA:0:8}
    - docker tag ${REGISTRY_IMAGE}:${CI_COMMIT_SHA:0:8} ${REGISTRY_IMAGE}:${CI_COMMIT_TAG}
    - docker push ${REGISTRY_IMAGE}:${CI_COMMIT_TAG}
  only:
    - tags
