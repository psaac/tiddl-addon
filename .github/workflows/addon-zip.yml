name: Build Firefox Addon Zip

on:
  release:
    types:
      - published

jobs:
  build-addon-zip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update manifest version from release tag
        run: |
          set -euo pipefail
          RAW_TAG="${{ github.event.release.tag_name }}"
          VERSION="${RAW_TAG#v}"

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag '$RAW_TAG'. Expected format: vX.Y.Z or X.Y.Z"
            exit 1
          fi

          sed -Ei '0,/"version": "[^"]+"/s//"version": "'"$VERSION"'"/' firefox-addon/manifest.json
          echo "Updated manifest version to $VERSION"

      - name: Build zip archive
        run: |
          set -euo pipefail
          cd firefox-addon
          ZIP_NAME="tiddl-local-runner-${{ github.event.release.tag_name }}.zip"
          zip -r "../$ZIP_NAME" . -x "*.DS_Store"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Upload zip to release assets
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
