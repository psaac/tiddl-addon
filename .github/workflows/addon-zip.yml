name: Build Firefox Addon Zip

on:
  release:
    types:
      - published

jobs:
  build-addon-zip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build zip archive
        run: |
          set -euo pipefail
          cd firefox-addon
          ZIP_NAME="tiddl-local-runner-${{ github.event.release.tag_name }}.zip"
          zip -r "../$ZIP_NAME" . -x "*.DS_Store"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Upload zip to release assets
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
